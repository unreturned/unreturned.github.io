<style>
    :root {
        --ink: #1a2332;
        --link: #0d4f5c;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        padding: 2.5rem 1.25rem 3rem;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        background:
            radial-gradient(ellipse 80% 50% at 20% 10%, rgba(255, 186, 140, 0.55), transparent 55%),
            radial-gradient(ellipse 70% 45% at 90% 20%, rgba(120, 210, 200, 0.45), transparent 50%),
            radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255, 160, 170, 0.35), transparent 55%),
            linear-gradient(160deg, #f7d9c4 0%, #c8ebe6 42%, #b8d4e8 78%, #e8c4d4 100%);
        background-attachment: fixed;
        animation: wash 18s ease-in-out infinite alternate;
    }

    @keyframes wash {
        from {
            background-position: 0% 0%, 100% 0%, 50% 100%, 0% 0%;
        }
        to {
            background-position: 15% 10%, 80% 15%, 40% 90%, 0% 0%;
        }
    }

    h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        text-align: center;
        text-wrap: balance;
    }

    a {
        color: var(--link);
        text-decoration: none;
        font-size: 2.4rem;
        line-height: 1;
        transition: transform 0.2s ease, filter 0.2s ease;
    }

    a:hover {
        transform: scale(1.15);
        filter: drop-shadow(0 4px 10px rgba(26, 35, 50, 0.2));
    }

    iframe {
        max-width: 100%;
        border-radius: 12px;
        box-shadow: 0 8px 28px rgba(26, 35, 50, 0.12);
    }
</style>
